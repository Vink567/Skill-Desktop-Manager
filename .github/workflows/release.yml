name: Build release assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag to upload assets to
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Electron runtime
        run: node node_modules/electron/install.js
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ""
          force_no_cache: "true"
      - name: Verify Electron runtime
        run: node -e "console.log(require('electron'))"
      - run: npm test
      - run: npm run smoke
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

  build-macos:
    name: Build macOS packages
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Electron runtime
        run: node node_modules/electron/install.js
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ""
          force_no_cache: "true"
      - name: Verify Electron runtime
        run: node -e "console.log(require('electron'))"
      - run: npm test
      - run: npm run smoke
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml

  upload-release-assets:
    name: Upload assets to release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" --title "Skill Desktop Manager $TAG" --notes "Release assets for Skill Desktop Manager."
          fi
          mapfile -t assets < <(find release-assets -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.blockmap' -o -name 'latest.yml' -o -name 'latest-mac.yml' \) | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi
          gh release upload "$TAG" "${assets[@]}" --repo "$REPO" --clobber
